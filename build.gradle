plugins {
    id 'application'
}

repositories {
    mavenCentral()
}

dependencies {
    testImplementation 'org.junit.jupiter:junit-jupiter:5.8.1'

    // Selenium
    testImplementation 'org.seleniumhq.selenium:selenium-java:4.41.0'

    // TestNG
    testImplementation 'org.testng:testng:7.12.0'
}

application {
    mainClass = 'com.example.Main'
}

test {
    useTestNG()
}
